services:

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  app:
    build: .
    environment:
      - SPRING_REDIS_HOST=redis
    depends_on:
      - redis
    expose:
      - "8080"

  nginx:
    image: nginx:latest
    ports:
      - "${PORT}:80"
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro